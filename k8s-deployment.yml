apiVersion: apps/v1
kind: Deployment
metadata:
  name: studypath-api-deployment
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: studypath-api
  template:
    metadata:
      labels:
        app: studypath-api
    spec:
      containers:
      - name: studypath-api
        image: viratsonawane/my-flask-app:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: studypath-api-service
spec:
  type: NodePort
  selector:
    app: studypath-api
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30005